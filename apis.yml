aid: marginedge
name: MarginEdge
description: >-
  MarginEdge is a restaurant back-office platform that automates invoice
  processing, inventory, recipe costing, and bill payment, syncing daily food
  cost and sales data into a restaurant's accounting system. Founded in 2015, it
  serves over 7,000 restaurants across all 50 states. For developers, MarginEdge
  publishes a public API through a dedicated developer portal that lets
  authorized parties programmatically retrieve invoice and product data from the
  restaurants they are permitted to access. Typical consumers include multi-unit
  operators building custom reporting, accounting groups, and business
  intelligence providers contracting with MarginEdge customers to deliver data
  services.
