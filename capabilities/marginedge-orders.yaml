naftiko: 1.0.0-alpha2
info:
  label: MarginEdge Public API — Orders
  description: 'Orders surface of the MarginEdge Public API. 2 operation(s). Lead operation: MarginEdge Get Orders. Self-contained
    Naftiko capability covering one MarginEdge business surface.'
  tags:
  - MarginEdge
  - Restaurant
  - Orders
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    MARGINEDGE_API_KEY: MARGINEDGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: marginedge-orders
    baseUri: https://api.marginedge.com/public
    description: MarginEdge Public API — Orders business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.MARGINEDGE_API_KEY}}'
      placement: header
    resources:
    - name: orders
      path: /orders
      operations:
      - name: getOrders
        method: GET
        description: MarginEdge Get Orders
        inputParameters:
        - name: nextPage
          in: query
          type: string
          required: false
          description: ''
        - name: orderStatus
          in: query
          type: string
          required: false
          description: ''
        - name: endDate
          in: query
          type: string
          required: true
          description: ''
        - name: restaurantUnitId
          in: query
          type: string
          required: true
          description: ''
        - name: startDate
          in: query
          type: string
          required: true
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders-orderid
      path: /orders/{orderId}
      operations:
      - name: getOrderDetail
        method: GET
        description: MarginEdge Get Order Detail
        inputParameters:
        - name: restaurantUnitId
          in: query
          type: string
          required: true
          description: ''
        - name: orderId
          in: path
          type: string
          required: true
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: marginedge-orders-rest
    port: 8080
    description: REST adapter for MarginEdge Public API — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for MarginEdge Get Orders.
      operations:
      - method: GET
        name: getOrders
        description: MarginEdge Get Orders
        call: marginedge-orders.getOrders
        with:
          nextPage: rest.nextPage
          orderStatus: rest.orderStatus
          endDate: rest.endDate
          restaurantUnitId: rest.restaurantUnitId
          startDate: rest.startDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{order-id}
      name: orders-orderid
      description: REST surface for MarginEdge Get Order Detail.
      operations:
      - method: GET
        name: getOrderDetail
        description: MarginEdge Get Order Detail
        call: marginedge-orders.getOrderDetail
        with:
          restaurantUnitId: rest.restaurantUnitId
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marginedge-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for MarginEdge Public API — Orders. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-orders
      description: MarginEdge Get Orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marginedge-orders.getOrders
      with:
        nextPage: tools.nextPage
        orderStatus: tools.orderStatus
        endDate: tools.endDate
        restaurantUnitId: tools.restaurantUnitId
        startDate: tools.startDate
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order-detail
      description: MarginEdge Get Order Detail
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marginedge-orders.getOrderDetail
      with:
        restaurantUnitId: tools.restaurantUnitId
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
