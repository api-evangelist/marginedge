naftiko: 1.0.0-alpha2
info:
  label: MarginEdge Public API — Products
  description: 'Products surface of the MarginEdge Public API. 1 operation(s). Lead operation: MarginEdge Get Products. Self-contained
    Naftiko capability covering one MarginEdge business surface.'
  tags:
  - MarginEdge
  - Restaurant
  - Products
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    MARGINEDGE_API_KEY: MARGINEDGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: marginedge-products
    baseUri: https://api.marginedge.com/public
    description: MarginEdge Public API — Products business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.MARGINEDGE_API_KEY}}'
      placement: header
    resources:
    - name: products
      path: /products
      operations:
      - name: getProducts
        method: GET
        description: MarginEdge Get Products
        inputParameters:
        - name: restaurantUnitId
          in: query
          type: string
          required: true
          description: ''
        - name: nextPage
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: marginedge-products-rest
    port: 8080
    description: REST adapter for MarginEdge Public API — Products. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/products
      name: products
      description: REST surface for MarginEdge Get Products.
      operations:
      - method: GET
        name: getProducts
        description: MarginEdge Get Products
        call: marginedge-products.getProducts
        with:
          restaurantUnitId: rest.restaurantUnitId
          nextPage: rest.nextPage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marginedge-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for MarginEdge Public API — Products. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-products
      description: MarginEdge Get Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marginedge-products.getProducts
      with:
        restaurantUnitId: tools.restaurantUnitId
        nextPage: tools.nextPage
      outputParameters:
      - type: object
        mapping: $.
