naftiko: 1.0.0-alpha2
info:
  label: MarginEdge Public API — Vendors
  description: 'Vendors surface of the MarginEdge Public API. 3 operation(s). Lead operation: MarginEdge Get Vendors. Self-contained
    Naftiko capability covering one MarginEdge business surface.'
  tags:
  - MarginEdge
  - Restaurant
  - Vendors
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    MARGINEDGE_API_KEY: MARGINEDGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: marginedge-vendors
    baseUri: https://api.marginedge.com/public
    description: MarginEdge Public API — Vendors business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.MARGINEDGE_API_KEY}}'
      placement: header
    resources:
    - name: vendors
      path: /vendors
      operations:
      - name: getVendors
        method: GET
        description: MarginEdge Get Vendors
        inputParameters:
        - name: restaurantUnitId
          in: query
          type: string
          required: true
          description: ''
        - name: nextPage
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: vendors-vendorid-vendoritems
      path: /vendors/{vendorId}/vendorItems
      operations:
      - name: getVendorItems
        method: GET
        description: MarginEdge Get Vendor Items
        inputParameters:
        - name: restaurantUnitId
          in: query
          type: string
          required: true
          description: ''
        - name: vendorId
          in: path
          type: string
          required: true
          description: ''
        - name: nextPage
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: vendors-vendorid-vendoritems-vendoritemcode-packaging
      path: /vendors/{vendorId}/vendorItems/{vendorItemCode}/packaging
      operations:
      - name: getVendorItemsPackaging
        method: GET
        description: MarginEdge Get Vendor Items Packaging
        inputParameters:
        - name: restaurantUnitId
          in: query
          type: string
          required: true
          description: ''
        - name: vendorId
          in: path
          type: string
          required: true
          description: ''
        - name: vendorItemCode
          in: path
          type: string
          required: true
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: marginedge-vendors-rest
    port: 8080
    description: REST adapter for MarginEdge Public API — Vendors. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/vendors
      name: vendors
      description: REST surface for MarginEdge Get Vendors.
      operations:
      - method: GET
        name: getVendors
        description: MarginEdge Get Vendors
        call: marginedge-vendors.getVendors
        with:
          restaurantUnitId: rest.restaurantUnitId
          nextPage: rest.nextPage
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vendors/{vendor-id}/vendor-items
      name: vendors-vendorid-vendoritems
      description: REST surface for MarginEdge Get Vendor Items.
      operations:
      - method: GET
        name: getVendorItems
        description: MarginEdge Get Vendor Items
        call: marginedge-vendors.getVendorItems
        with:
          restaurantUnitId: rest.restaurantUnitId
          vendorId: rest.vendorId
          nextPage: rest.nextPage
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vendors/{vendor-id}/vendor-items/{vendor-item-code}/packaging
      name: vendors-vendorid-vendoritems-vendoritemcode-packaging
      description: REST surface for MarginEdge Get Vendor Items Packaging.
      operations:
      - method: GET
        name: getVendorItemsPackaging
        description: MarginEdge Get Vendor Items Packaging
        call: marginedge-vendors.getVendorItemsPackaging
        with:
          restaurantUnitId: rest.restaurantUnitId
          vendorId: rest.vendorId
          vendorItemCode: rest.vendorItemCode
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marginedge-vendors-mcp
    port: 9090
    transport: http
    description: MCP adapter for MarginEdge Public API — Vendors. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-vendors
      description: MarginEdge Get Vendors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marginedge-vendors.getVendors
      with:
        restaurantUnitId: tools.restaurantUnitId
        nextPage: tools.nextPage
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vendor-items
      description: MarginEdge Get Vendor Items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marginedge-vendors.getVendorItems
      with:
        restaurantUnitId: tools.restaurantUnitId
        vendorId: tools.vendorId
        nextPage: tools.nextPage
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vendor-items-packaging
      description: MarginEdge Get Vendor Items Packaging
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marginedge-vendors.getVendorItemsPackaging
      with:
        restaurantUnitId: tools.restaurantUnitId
        vendorId: tools.vendorId
        vendorItemCode: tools.vendorItemCode
      outputParameters:
      - type: object
        mapping: $.
