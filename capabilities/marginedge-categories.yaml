naftiko: 1.0.0-alpha2
info:
  label: MarginEdge Public API — Categories
  description: 'Categories surface of the MarginEdge Public API. 1 operation(s). Lead operation: MarginEdge Get Categories.
    Self-contained Naftiko capability covering one MarginEdge business surface.'
  tags:
  - MarginEdge
  - Restaurant
  - Categories
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    MARGINEDGE_API_KEY: MARGINEDGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: marginedge-categories
    baseUri: https://api.marginedge.com/public
    description: MarginEdge Public API — Categories business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.MARGINEDGE_API_KEY}}'
      placement: header
    resources:
    - name: categories
      path: /categories
      operations:
      - name: getCategories
        method: GET
        description: MarginEdge Get Categories
        inputParameters:
        - name: restaurantUnitId
          in: query
          type: string
          required: true
          description: ''
        - name: nextPage
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: marginedge-categories-rest
    port: 8080
    description: REST adapter for MarginEdge Public API — Categories. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/categories
      name: categories
      description: REST surface for MarginEdge Get Categories.
      operations:
      - method: GET
        name: getCategories
        description: MarginEdge Get Categories
        call: marginedge-categories.getCategories
        with:
          restaurantUnitId: rest.restaurantUnitId
          nextPage: rest.nextPage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marginedge-categories-mcp
    port: 9090
    transport: http
    description: MCP adapter for MarginEdge Public API — Categories. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-categories
      description: MarginEdge Get Categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marginedge-categories.getCategories
      with:
        restaurantUnitId: tools.restaurantUnitId
        nextPage: tools.nextPage
      outputParameters:
      - type: object
        mapping: $.
